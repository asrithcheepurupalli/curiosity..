# Daily auto-publish.
#
# Posts are written ahead of time with future dates. The site hides any post whose
# date has not arrived yet (see the date filters in index.astro, [slug].astro, rss.xml.ts).
# This job pings a Netlify build hook once a day, so the site rebuilds and reveals
# whatever posts have come due. No manual deploy needed.
#
# ONE-TIME SETUP:
#   1. Netlify -> your site -> Site configuration -> Build & deploy -> Build hooks
#      -> "Add build hook", name it "Daily publish", branch main. Copy the URL.
#   2. GitHub -> this repo -> Settings -> Secrets and variables -> Actions
#      -> New repository secret, name: NETLIFY_BUILD_HOOK, value: the URL from step 1.
# That's it. You can also run it on demand from the Actions tab (workflow_dispatch).

name: Daily publish

on:
  schedule:
    # 06:30 UTC every day. Adjust if you want a different reveal time.
    - cron: '30 6 * * *'
  workflow_dispatch: {}

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify rebuild
        run: |
          if [ -z "${{ secrets.NETLIFY_BUILD_HOOK }}" ]; then
            echo "NETLIFY_BUILD_HOOK secret is not set. See setup notes in this file."
            exit 1
          fi
          curl -fsS -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
          echo "Rebuild triggered."
